<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Scheme-JS</title>
  <link rel="stylesheet" href="panel.css">
</head>

<body>
  <!-- Top toolbar — debug.js mounts the debug controls into #toolbar-debug -->
  <div id="toolbar" class="toolbar">
    <span class="toolbar-title">Scheme-JS</span>
    <div id="toolbar-debug"></div>
  </div>

  <!-- Main split layout: sidebar | editor | right panel -->
  <div id="main-layout" class="main-layout">

    <!-- Left sidebar: source file list -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">Sources</div>
      <div id="source-list" class="source-list"></div>
    </div>

    <!-- Splitter handle (sidebar ↔ editor) -->
    <div id="splitter" class="splitter"></div>

    <!-- Center: CodeMirror editor -->
    <div id="editor-area" class="editor-area">
      <div id="editor-container" class="editor-container"></div>
    </div>

    <!-- Right panel: call stack + variables (shown when paused) -->
    <div id="right-panel" class="right-panel">
      <div class="panel-section">
        <div class="section-header">Call Stack</div>
        <div id="call-stack-container" class="section-content"></div>
      </div>
      <div class="section-divider"></div>
      <div class="panel-section">
        <div class="section-header">Variables</div>
        <div id="variables-container" class="section-content"></div>
      </div>
    </div>

  </div>

  <!-- Panel bundle (ESM, built by build-panel.js) -->
  <script type="module" src="panel.js"></script>
</body>

</html>
