<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="sidebar.css">
</head>

<body>
    <!-- Step Controls -->
    <div id="toolbar" class="toolbar">
        <button id="btn-step-into" title="Step Into (next Scheme expression)">⮯ Into</button>
        <button id="btn-step-over" title="Step Over (next expression at same depth)">⮕ Over</button>
        <button id="btn-step-out" title="Step Out (exit current function)">⮭ Out</button>
    </div>

    <!-- Stack Frame List -->
    <div id="frame-list" class="section">
        <div class="section-header">Call Stack</div>
        <div id="frames" class="frames"></div>
    </div>

    <!-- Variables Display -->
    <div id="variables-section" class="section">
        <div class="section-header">Variables</div>
        <div id="variables" class="variables"></div>
    </div>

    <!-- Status -->
    <div id="status" class="status">Not paused</div>

    <script src="sidebar.js"></script>
</body>

</html>
